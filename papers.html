<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Research papers that shaped my understanding of distributed systems and AI."
    />
    <title>Research Papers · Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

    <div class="page">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>

      <div id="siteHeader"></div>

      <main id="top">
        <section id="papers" class="container section">
          <div class="mb-3">
            <h1 class="section-title">Research papers I read</h1>
            <p class="section-subtitle">

          <div id="papersGrid" class="row g-3"></div>
        </section>
      </main>

      <div id="siteFooter"></div>
    </div>

    <div id="papersModals"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"

    <script src="assets/layout.js" defer></script>
